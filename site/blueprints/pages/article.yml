title: Artículo del blog
icon: 📖

tabs:
  content:
    label: Contenido
    icon: text
    columns:
      main:
        width: 2/3
        fields:
          layout:
            type: layout
            label: Layout

      sidebar:
        width: 1/3
        sections:
          meta:
            type: fields
            fields:
              date:
                type: date
                time: true
                default: now
              author:
                type: users
                label: Autor
              picture:
                label: Foto de artículo 
                type: files
                max: 1
                layout: cards
              short:
                label: Texto corto
                type: textarea

  seo:
    label: SEO
    icon: search
    columns:
      - width: 2/3
        fields:
          meta_title:
            type: text
            label: Meta Title
            help: "El título que aparecerá en los resultados de búsqueda"
          meta_description:
            type: textarea
            label: Meta Description
            help: "Descripción breve para los motores de búsqueda"
          meta_keywords:
            type: tags
            label: Meta Keywords
            help: "Palabras clave separadas por comas"
      - width: 1/3
        fields:
          og_image:
            type: files
            label: Open Graph Image
            max: 1
            help: "Imagen para compartir en redes sociales"